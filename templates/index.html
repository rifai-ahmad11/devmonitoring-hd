<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD Machine Monitoring Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            color: #1e1e2f;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
            color: #1e3a6f;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, #4a90e2, #2b6cb0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
            text-align: center;
            line-height: 1.4;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: #5f7d9c;
            margin-top: 6px;
            text-align: center;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #2c3e50;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background-color: transparent;
        }

        .nav-item i {
            width: 20px;
            font-size: 1.2rem;
            color: #4a6a8a;
        }

        .nav-item.active {
            background-color: #eef4ff;
            color: #2b6cb0;
        }

        .nav-item.active i {
            color: #2b6cb0;
        }

        .nav-item:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.5);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            color: white;
        }

        /* Header area */
        .content-header {
            display: flex;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .content-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            flex: 1;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .back-button, .refresh-button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .back-button:hover, .refresh-button:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .refresh-button i {
            font-size: 16px;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: white;
            border-radius: 18px;
            padding: 20px 18px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            transition: transform 0.15s;
            border: none;
        }

        .summary-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .card-header i {
            font-size: 28px;
            color: #4a90e2;
            opacity: 0.8;
        }

        .card-label {
            font-size: 14px;
            font-weight: 600;
            color: #5f738c;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .card-value {
            font-size: 38px;
            font-weight: 700;
            color: #1e3a6f;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background-color: #e3eaf3;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90e2, #2b6cb0);
            border-radius: 10px;
            width: 0%;
        }

        .progress-percent {
            font-size: 13px;
            font-weight: 600;
            color: #3a6ea5;
            min-width: 40px;
            text-align: right;
        }

        /* RS Grid */
        .section-title {
            font-size: 22px;
            font-weight: 600;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
            margin-bottom: 18px;
        }

        .rs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .rs-card {
            background: white;
            border-radius: 16px;
            padding: 22px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .rs-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.2);
            background: #fafbff;
        }

        .rs-name {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
            margin-bottom: 8px;
        }

        .rs-unit-count {
            font-size: 14px;
            color: #5f7d9c;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        .rs-stats-mini {
            display: flex;
            gap: 12px;
            font-size: 13px;
        }

        .stat-dot {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #2c3e50;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot.green { background: #2ecc71; }
        .dot.blue { background: #3498db; }
        .dot.orange { background: #e67e22; }

        /* Machine Cards (Detail) */
        .machines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .machine-card {
            background: white;
            border-radius: 16px;
            padding: 18px 18px 14px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            transition: all 0.2s;
        }

        .machine-card:hover {
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-3px);
        }

        .machine-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .machine-id-section {
            line-height: 1.3;
        }

        .machine-main-id {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
        }

        .machine-sub {
            font-size: 12px;
            color: #6b85a0;
            margin-top: 4px;
        }

        .machine-sn {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 12px;
            color: #4a6a8a;
            background: #f0f6ff;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 5px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.hd-on { background: #2ecc71; color: white; }
        .status-badge.idle { background: #b0c4de; color: #1e3a6f; }
        .status-badge.treatment { background: #3498db; color: white; }
        .status-badge.maintenance { background: #e67e22; color: white; }

        .machine-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0 8px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-label {
            font-size: 13px;
            color: #5f7d9c;
            font-weight: 500;
        }

        .stat-value {
            font-weight: 700;
            color: #1e3a6f;
            font-size: 15px;
        }

        /* Warna time-value seperti sebelumnya */
        .time-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .dialysis-time-value {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .progress-small {
            width: 100%;
            height: 5px;
            background: #e3eaf3;
            border-radius: 5px;
            margin-top: 4px;
        }

        .progress-fill {
            height: 5px;
            background: #4a90e2;
            border-radius: 5px;
            width: 0%;
        }

        .last-update {
            font-size: 10px;
            color: #9aabbc;
            text-align: right;
            margin-top: 8px;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.9);
            font-size: 18px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 700px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.2); }
            .main-content { padding: 16px; }
            .summary-grid { grid-template-columns: 1fr; }
        }

        /* Sembunyikan tombol back saat home */
        .back-button.hidden { display: none; }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-heartbeat"></i>
            </div>
            <div class="sidebar-title">HD Machine Monitoring</div>
            <div class="sidebar-subtitle">Real-time Monitoring System</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" id="navHome">
                <i class="fas fa-chart-pie"></i>
                <span>Ringkasan</span>
            </div>
            <!-- Tambahan menu lain bisa di sini -->
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <div class="content-header">
            <h1 id="viewTitle">Ringkasan</h1>
            <div class="header-actions">
                <button class="back-button hidden" id="backButton">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
                <button class="refresh-button" id="refreshButton">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>
        <div id="dynamicContent">
            <div class="empty-message">Memuat data...</div>
        </div>
    </div>

    <script>
        (function(){
            // ---------- STATE ----------
            let currentView = 'home';          // 'home' atau 'detail'
            let selectedRS = null;
            let machinesData = {};             // data mentah dari API
            
            // Elemen DOM
            const viewTitle = document.getElementById('viewTitle');
            const backButton = document.getElementById('backButton');
            const dynamicContent = document.getElementById('dynamicContent');
            const navHome = document.getElementById('navHome');
            const refreshBtn = document.getElementById('refreshButton');

            // ---------- HELPER ----------
            function parseMachineId(fullId) {
                const parts = fullId.split('-');
                return {
                    id: parts[0] || fullId,
                    rs: parts[1] || '',
                    sn: parts[2] || ''
                };
            }

            function formatTime(seconds) {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            function formatDateTime(isoString) {
                if (!isoString) return 'Belum update';
                const d = new Date(isoString);
                return d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            }

            function getMainStatus(machine) {
                if (machine.maintenance_count > 0) return 'maintenance';
                if (machine.pump_status === 'running') return 'treatment';
                if (machine.status === 'running') return 'hd-on';
                return 'idle';
            }

            // ---------- GROUPING ----------
            function groupByRS(machines) {
                const groups = {};
                Object.entries(machines).forEach(([machineId, data]) => {
                    const parsed = parseMachineId(machineId);
                    const rsName = parsed.rs || 'Tanpa RS';
                    if (!groups[rsName]) {
                        groups[rsName] = {
                            machines: [],
                            total: 0,
                            hdOn: 0,
                            treatment: 0,
                            maintenance: 0
                        };
                    }
                    groups[rsName].machines.push({ machineId, data, parsed });
                    groups[rsName].total++;
                    if (data.status === 'running') groups[rsName].hdOn++;
                    if (data.pump_status === 'running') groups[rsName].treatment++;
                    if (data.maintenance_count > 0) groups[rsName].maintenance++;
                });
                return groups;
            }

            function computeGlobalStats(machines) {
                const stats = { total:0, hdOn:0, treatment:0, maintenance:0 };
                Object.values(machines).forEach(m => {
                    stats.total++;
                    if (m.status === 'running') stats.hdOn++;
                    if (m.pump_status === 'running') stats.treatment++;
                    if (m.maintenance_count > 0) stats.maintenance++;
                });
                return stats;
            }

            // ---------- RENDER ----------
            function renderHome() {
                viewTitle.textContent = 'Ringkasan';
                backButton.classList.add('hidden');
                
                const stats = computeGlobalStats(machinesData);
                const groups = groupByRS(machinesData);
                const rsList = Object.keys(groups).sort();

                const percentHd = stats.total ? (stats.hdOn / stats.total * 100) : 0;
                const percentTreatment = stats.total ? (stats.treatment / stats.total * 100) : 0;
                const percentMaintenance = stats.total ? (stats.maintenance / stats.total * 100) : 0;

                let html = `
                    <div class="summary-grid">
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">Total Mesin</span><i class="fas fa-server"></i></div>
                            <div class="card-value">${stats.total}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%"></div></div><span class="progress-percent">100%</span></div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">HD ON</span><i class="fas fa-play-circle"></i></div>
                            <div class="card-value">${stats.hdOn}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentHd}%"></div></div><span class="progress-percent">${percentHd.toFixed(0)}%</span></div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">IN TREATMENT</span><i class="fas fa-syringe"></i></div>
                            <div class="card-value">${stats.treatment}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentTreatment}%"></div></div><span class="progress-percent">${percentTreatment.toFixed(0)}%</span></div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">NEED MAINTENANCE</span><i class="fas fa-tools"></i></div>
                            <div class="card-value">${stats.maintenance}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentMaintenance}%"></div></div><span class="progress-percent">${percentMaintenance.toFixed(0)}%</span></div>
                        </div>
                    </div>
                    <div class="section-title">Daftar Rumah Sakit / Klinik</div>
                    <div class="rs-grid">
                `;

                if (rsList.length === 0) {
                    html += `<div class="empty-message">Belum ada data mesin.</div>`;
                } else {
                    rsList.forEach(rsName => {
                        const g = groups[rsName];
                        html += `
                            <div class="rs-card" data-rs="${rsName}">
                                <div class="rs-name">${rsName}</div>
                                <div class="rs-unit-count"><i class="fas fa-microchip"></i> ${g.total} unit</div>
                                <div class="rs-stats-mini">
                                    <span class="stat-dot"><span class="dot green"></span> ${g.hdOn}</span>
                                    <span class="stat-dot"><span class="dot blue"></span> ${g.treatment}</span>
                                    <span class="stat-dot"><span class="dot orange"></span> ${g.maintenance}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
                dynamicContent.innerHTML = html;

                document.querySelectorAll('.rs-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const rs = card.dataset.rs;
                        if (rs) {
                            selectedRS = rs;
                            currentView = 'detail';
                            renderDetail(rs);
                        }
                    });
                });
            }

            function renderDetail(rsName) {
                viewTitle.textContent = rsName;
                backButton.classList.remove('hidden');
                
                const groups = groupByRS(machinesData);
                const rsGroup = groups[rsName] || { machines: [], total:0, hdOn:0, treatment:0, maintenance:0 };
                const machines = rsGroup.machines;
                const stats = {
                    total: rsGroup.total,
                    hdOn: rsGroup.hdOn,
                    treatment: rsGroup.treatment,
                    maintenance: rsGroup.maintenance
                };

                const percentHd = stats.total ? (stats.hdOn / stats.total * 100) : 0;
                const percentTreatment = stats.total ? (stats.treatment / stats.total * 100) : 0;
                const percentMaintenance = stats.total ? (stats.maintenance / stats.total * 100) : 0;

                let html = `
                    <div class="summary-grid">
                        <div class="summary-card"><div class="card-header"><span class="card-label">Total Mesin</span><i class="fas fa-server"></i></div><div class="card-value">${stats.total}</div><div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%"></div></div><span class="progress-percent">100%</span></div></div>
                        <div class="summary-card"><div class="card-header"><span class="card-label">HD ON</span><i class="fas fa-play-circle"></i></div><div class="card-value">${stats.hdOn}</div><div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentHd}%"></div></div><span class="progress-percent">${percentHd.toFixed(0)}%</span></div></div>
                        <div class="summary-card"><div class="card-header"><span class="card-label">IN TREATMENT</span><i class="fas fa-syringe"></i></div><div class="card-value">${stats.treatment}</div><div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentTreatment}%"></div></div><span class="progress-percent">${percentTreatment.toFixed(0)}%</span></div></div>
                        <div class="summary-card"><div class="card-header"><span class="card-label">NEED MAINTENANCE</span><i class="fas fa-tools"></i></div><div class="card-value">${stats.maintenance}</div><div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentMaintenance}%"></div></div><span class="progress-percent">${percentMaintenance.toFixed(0)}%</span></div></div>
                    </div>
                    <div class="section-title">Rincian Mesin</div>
                    <div class="machines-grid" id="machinesGridContainer">
                `;

                if (machines.length === 0) {
                    html += `<div class="empty-message">Tidak ada mesin di RS ini.</div>`;
                } else {
                    machines.sort((a,b) => a.machineId.localeCompare(b.machineId));
                    machines.forEach(({ machineId, data, parsed }) => {
                        const mainStatus = getMainStatus(data);
                        let statusText = '', statusClass = '';
                        switch(mainStatus) {
                            case 'hd-on': statusText = 'HD ON'; statusClass = 'hd-on'; break;
                            case 'treatment': statusText = 'IN TREATMENT'; statusClass = 'treatment'; break;
                            case 'maintenance': statusText = 'NEED MAINTENANCE'; statusClass = 'maintenance'; break;
                            default: statusText = 'IDLE'; statusClass = 'idle';
                        }
                        
                        const activeDuration = formatTime(data.current_session_duration || 0);
                        const totalActive = formatTime(data.total_active_time || 0);
                        const dialysisDuration = formatTime(data.current_dialysis_duration || 0);
                        const totalDialysis = formatTime(data.total_dialysis_time || 0);
                        const treatmentProgress = data.status === 'running' ? Math.min((data.current_session_duration / 5440) * 100, 100) : 0;
                        
                        html += `
                            <div class="machine-card" data-machine-id="${machineId}">
                                <div class="machine-header">
                                    <div class="machine-id-section">
                                        <div class="machine-main-id">${parsed.id}</div>
                                        <div class="machine-sub">${parsed.rs || 'Tanpa RS'}</div>
                                        <span class="machine-sn">SN: ${parsed.sn || 'N/A'}</span>
                                    </div>
                                    <div class="status-badge ${statusClass}">${statusText}</div>
                                </div>
                                <div class="machine-stats">
                                    <div class="stat-row">
                                        <span class="stat-label">Waktu Aktif</span>
                                        <span class="stat-value time-value" data-field="active">${activeDuration}</span>
                                    </div>
                                    <div class="progress-small"><div class="progress-fill" style="width:${treatmentProgress}%"></div></div>
                                    <div class="stat-row">
                                        <span class="stat-label">Total Aktif</span>
                                        <span class="stat-value" data-field="totalActive">${totalActive}</span>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Treatment</span>
                                        <span class="stat-value dialysis-time-value" data-field="dialysis">${dialysisDuration}</span>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Total Treatment</span>
                                        <span class="stat-value" data-field="totalDialysis">${totalDialysis}</span>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Sesi Selesai</span>
                                        <span class="stat-value">${data.completed_treatments || 0} / ${data.completed_dialysis || 0}</span>
                                    </div>
                                </div>
                                <div class="last-update">Update: ${formatDateTime(data.last_update)}</div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
                dynamicContent.innerHTML = html;
            }

            // ---------- TIMER REAL-TIME (mempertahankan mekanisme lama) ----------
            function updateTimers() {
                if (!machinesData) return;
                
                // Hanya proses jika di detail view (ada grid mesin)
                const grid = document.getElementById('machinesGridContainer');
                if (!grid) return;
                
                const cards = grid.querySelectorAll('.machine-card');
                cards.forEach(card => {
                    const machineId = card.dataset.machineId;
                    const machine = machinesData[machineId];
                    if (!machine) return;
                    
                    const status = machine.status;
                    const pumpStatus = machine.pump_status;
                    
                    // Update active duration (treatment time) jika status running
                    if (status === 'running') {
                        const activeElem = card.querySelector('[data-field="active"]');
                        if (activeElem) {
                            let currentSeconds = machine.current_session_duration || 0;
                            currentSeconds += 1;
                            machine.current_session_duration = currentSeconds; // update di state lokal
                            activeElem.textContent = formatTime(currentSeconds);
                        }
                        // Update progress bar (optional)
                        const progressFill = card.querySelector('.progress-fill');
                        if (progressFill) {
                            const progress = Math.min((machine.current_session_duration / 5440) * 100, 100);
                            progressFill.style.width = progress + '%';
                        }
                    }
                    
                    // Update dialysis duration jika pump running
                    if (pumpStatus === 'running') {
                        const dialysisElem = card.querySelector('[data-field="dialysis"]');
                        if (dialysisElem) {
                            let currentDialysis = machine.current_dialysis_duration || 0;
                            currentDialysis += 1;
                            machine.current_dialysis_duration = currentDialysis;
                            dialysisElem.textContent = formatTime(currentDialysis);
                        }
                    }
                    
                    // Update total values tidak berubah karena hanya dihitung saat sesi selesai di server
                    // Update last update time setiap detik? Bisa juga, tapi opsional.
                });
            }

            // ---------- FETCH DATA ----------
            async function loadData() {
                try {
                    const response = await fetch('/api/machines');
                    if (!response.ok) throw new Error('Gagal memuat data');
                    const freshData = await response.json();
                    
                    // Merge dengan data lokal yang mungkin sudah bertambah durasinya via timer
                    // Agar timer tetap sinkron, kita gabungkan: pertahankan current_session_duration jika mesin running?
                    // Untuk amannya, kita timpa dengan data server, tapi timer akan menambah sendiri.
                    machinesData = freshData;
                    
                    // Render ulang view saat ini
                    if (currentView === 'home') {
                        renderHome();
                    } else if (currentView === 'detail' && selectedRS) {
                        renderDetail(selectedRS);
                    } else {
                        currentView = 'home';
                        renderHome();
                    }
                } catch (err) {
                    console.error(err);
                    dynamicContent.innerHTML = `<div class="empty-message">Gagal memuat data. Periksa koneksi.</div>`;
                }
            }

            function goHome() {
                currentView = 'home';
                selectedRS = null;
                renderHome();
                navHome.classList.add('active');
            }

            function goBack() {
                if (currentView === 'detail') {
                    goHome();
                }
            }

            // Event Listeners
            navHome.addEventListener('click', goHome);
            backButton.addEventListener('click', goBack);
            refreshBtn.addEventListener('click', () => {
                loadData();
            });

            // Inisialisasi
            loadData();

            // Interval untuk update timer setiap detik (real-time)
            setInterval(updateTimers, 1000);
            
            // Polling data setiap 30 detik untuk sinkronisasi
            setInterval(loadData, 30000);
        })();
    </script>
</body>
</html>
