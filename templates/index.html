<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD Machine Monitoring Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            color: #1e1e2f;
        }

        /* ========== SIDEBAR (fixed, tidak scroll) ========== */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
            color: #1e3a6f;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, #4a90e2, #2b6cb0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
            text-align: center;
            line-height: 1.4;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: #5f7d9c;
            margin-top: 6px;
            text-align: center;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #2c3e50;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background-color: transparent;
        }

        .nav-item i {
            width: 20px;
            font-size: 1.2rem;
            color: #4a6a8a;
        }

        .nav-item.active {
            background-color: #eef4ff;
            color: #2b6cb0;
        }

        .nav-item.active i {
            color: #2b6cb0;
        }

        .nav-item:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.5);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            color: white;
            height: 100vh;
        }

        /* Header area */
        .content-header {
            display: flex;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .content-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            flex: 1;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .back-button, .refresh-button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .back-button:hover, .refresh-button:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .back-button.hidden { display: none; }

        /* ========== INSIGHTS STYLE (donut dengan SVG) ========== */
        .insights {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.6rem;
            margin-bottom: 2rem;
        }

        .insights > div {
            background: white;
            padding: 1.5rem;
            border-radius: 18px;
            margin-top: 0;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            transition: all 300ms ease;
        }

        .insights > div:hover {
            box-shadow: none;
            transform: translateY(-2px);
        }

        .insights .middle {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .insights h3 {
            margin: 0 0 0.6rem 0;
            font-size: 1rem;
            color: #5f738c;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .insights h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e3a6f;
            margin: 0;
        }

        .insights .progress {
            position: relative;
            width: 92px;
            height: 92px;
            border-radius: 50%;
        }

        .insights svg {
            width: 92px;
            height: 92px;
        }

        .insights svg circle {
            fill: none;
            stroke: #4a90e2;
            stroke-linecap: round;
            stroke-width: 10;
            transform: translate(5px, 5px) rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 0.5s ease;
        }

        .insights .progress .number {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .insights .progress .number p {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e3a6f;
            margin: 0;
        }

        /* Responsive insights */
        @media (max-width: 1000px) {
            .insights {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .insights {
                grid-template-columns: 1fr;
            }
        }

        /* RS Grid & Machine Cards (tetap seperti semula) */
        .section-title {
            font-size: 22px;
            font-weight: 600;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
            margin-bottom: 18px;
        }

        .rs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .rs-card {
            background: white;
            border-radius: 16px;
            padding: 22px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .rs-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.2);
            background: #fafbff;
        }

        .rs-name {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
            margin-bottom: 8px;
        }

        .rs-unit-count {
            font-size: 14px;
            color: #5f7d9c;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        .rs-stats-mini {
            display: flex;
            gap: 12px;
            font-size: 13px;
        }

        .stat-dot {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #2c3e50;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot.green { background: #2ecc71; }
        .dot.blue { background: #3498db; }
        .dot.orange { background: #e67e22; }

        /* Machine Cards (Detail) */
        .machines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .machine-card {
            background: white;
            border-radius: 16px;
            padding: 18px 18px 14px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            transition: all 0.2s;
        }

        .machine-card:hover {
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-3px);
        }

        .machine-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .machine-id-section {
            line-height: 1.3;
        }

        .machine-main-id {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
        }

        .machine-sub {
            font-size: 12px;
            color: #6b85a0;
            margin-top: 4px;
        }

        .machine-sn {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 12px;
            color: #4a6a8a;
            background: #f0f6ff;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 5px;
        }

        .header-badges {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.running { background: #4caf50; color: white; }
        .status-badge.stopped { background: #f44336; color: white; }
        .status-badge.treatment { background: #2196f3; color: white; }
        .status-badge.idle { background: #9e9e9e; color: white; }

        .maintenance-badge {
            background-color: #ffa502;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .maintenance-badge:hover {
            background-color: #ff9500;
            transform: scale(1.02);
        }

        .machine-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0 8px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-label {
            font-size: 13px;
            color: #5f7d9c;
            font-weight: 500;
        }

        .stat-value {
            font-weight: 700;
            color: #1e3a6f;
            font-size: 15px;
        }

        .time-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .dialysis-time-value {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .last-update {
            font-size: 10px;
            color: #9aabbc;
            text-align: right;
            margin-top: 8px;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.9);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }
        .modal-title { font-size: 1.5em; font-weight: bold; color: #333; }
        .close-button {
            background: none;
            border: none;
            font-size: 1.8em;
            cursor: pointer;
            color: #666;
        }
        .machine-id-modal { font-weight: bold; color: #667eea; }
        .maintenance-list { list-style: none; padding: 0; margin-top: 20px; }
        .maintenance-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #ffa502;
        }
        .maintenance-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .maintenance-item-title { font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .maintenance-item-desc { color: #666; font-size: 0.9em; margin-bottom: 8px; }
        .mark-done-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .threshold-info { background: #e8f4ff; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .threshold-note { color: #ff6b6b; font-style: italic; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
            <div class="sidebar-title">HD Machine Monitoring</div>
            <div class="sidebar-subtitle">Real-time Monitoring System</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" id="navHome">
                <i class="fas fa-chart-pie"></i>
                <span>Ringkasan</span>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <div class="content-header">
            <h1 id="viewTitle">Ringkasan</h1>
            <div class="header-actions">
                <button class="back-button hidden" id="backButton"><i class="fas fa-arrow-left"></i> Kembali</button>
                <button class="refresh-button" id="refreshButton"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
        </div>
        <div id="dynamicContent">
            <div class="empty-message">Memuat data...</div>
        </div>
    </div>

    <!-- MAINTENANCE MODAL -->
    <div id="maintenanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🛠️ Maintenance Required</h2>
                <button class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <span class="machine-id-modal">Serial Number: <span id="modalMachineId"></span></span>
                <p style="margin:15px 0; color:#666;">Komponen yang memerlukan perawatan:</p>
                <ul class="maintenance-list" id="maintenanceList"></ul>
                <div class="threshold-info">
                    <strong>📋 Threshold Maintenance:</strong><br>
                    Filter Endotoksin: Setiap 200 kali treatment
                </div>
                <div class="threshold-note">
                    *Note: Threshold ini merupakan estimasi.
                </div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            // ---------- STATE ----------
            let currentView = 'home';
            let selectedRS = null;
            let machinesData = {};

            const viewTitle = document.getElementById('viewTitle');
            const backButton = document.getElementById('backButton');
            const dynamicContent = document.getElementById('dynamicContent');
            const navHome = document.getElementById('navHome');
            const refreshBtn = document.getElementById('refreshButton');
            
            // Modal elements
            const modal = document.getElementById('maintenanceModal');
            const modalMachineId = document.getElementById('modalMachineId');
            const maintenanceList = document.getElementById('maintenanceList');
            const closeModalBtn = modal.querySelector('.close-button');

            // Konstanta untuk donut SVG (r=36, circumference = 2 * PI * 36)
            const CIRCUMFERENCE = 2 * Math.PI * 36; // ≈ 226.194671

            // ---------- HELPERS ----------
            function parseMachineId(fullId) {
                const parts = fullId.split('-');
                const rawId = parts[0] || fullId;
                const rawRs = parts[1] || '';
                const rawSn = parts[2] || '';
                const match = rawRs.match(/^(.+)_(\d+)$/);
                let rsBase = rawRs;
                let unit = '';
                if (match) {
                    rsBase = match[1];
                    unit = match[2];
                }
                return {
                    id: rawId,
                    rsRaw: rawRs,
                    rsBase: rsBase,
                    unit: unit,
                    sn: rawSn
                };
            }

            function formatTime(seconds) {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            function formatDateTime(isoString) {
                if (!isoString) return 'Belum update';
                return new Date(isoString).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            }

            function getMainStatus(machine) {
                if (machine.maintenance_count > 0) return 'maintenance';
                if (machine.pump_status === 'running') return 'treatment';
                if (machine.status === 'running') return 'running';
                return 'stopped';
            }

            function groupByRS(data) {
                const groups = {};
                Object.entries(data).forEach(([id, m]) => {
                    const parsed = parseMachineId(id);
                    const rsKey = parsed.rsBase || 'Tanpa RS';
                    if (!groups[rsKey]) {
                        groups[rsKey] = {
                            machines: [],
                            total: 0,
                            hdOn: 0,
                            treatment: 0,
                            maintenance: 0
                        };
                    }
                    groups[rsKey].machines.push({ machineId: id, data: m, parsed: parsed });
                    groups[rsKey].total++;
                    if (m.status === 'running') groups[rsKey].hdOn++;
                    if (m.pump_status === 'running') groups[rsKey].treatment++;
                    if (m.maintenance_count > 0) groups[rsKey].maintenance++;
                });
                return groups;
            }

            function computeGlobalStats(data) {
                const stats = { total:0, hdOn:0, treatment:0, maintenance:0 };
                Object.values(data).forEach(m => {
                    stats.total++;
                    if (m.status === 'running') stats.hdOn++;
                    if (m.pump_status === 'running') stats.treatment++;
                    if (m.maintenance_count > 0) stats.maintenance++;
                });
                return stats;
            }

            // Membuat HTML untuk donut insight berdasarkan label, value, dan percent (0-100)
            function generateInsightCard(label, value, percent, iconClass = '') {
                const offset = CIRCUMFERENCE * (1 - (percent / 100));
                // Untuk total mesin, selalu tampilkan 100% dan offset 0
                const finalPercent = label === 'Total Mesin' ? 100 : percent;
                const finalOffset = label === 'Total Mesin' ? 0 : CIRCUMFERENCE * (1 - (finalPercent / 100));
                return `
                    <div>
                        <div class="middle">
                            <div class="left">
                                <h3>${label}</h3>
                                <h2>${value}</h2>
                            </div>
                            <div class="progress">
                                <svg viewBox="0 0 92 92">
                                    <circle cx="40" cy="40" r="36" 
                                        stroke-dasharray="${CIRCUMFERENCE}" 
                                        stroke-dashoffset="${finalOffset}"
                                        style="stroke: #4a90e2; stroke-width: 12; fill: none; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center;">
                                    </circle>
                                </svg>
                                <div class="number">
                                    <p>${Math.round(finalPercent)}%</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // ---------- MODAL MAINTENANCE ----------
            function showMaintenanceModal(machineId, items) {
                const parsed = parseMachineId(machineId);
                modalMachineId.textContent = parsed.sn || machineId;
                maintenanceList.innerHTML = '';
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'maintenance-item';
                    li.innerHTML = `
                        <div class="maintenance-item-header">
                            <div class="maintenance-item-title">⚠️ ${item.name}</div>
                            <button class="mark-done-btn" data-machine="${machineId}" data-item="${item.item}">✓ Selesai</button>
                        </div>
                        <div class="maintenance-item-desc">${item.description}</div>
                        <div class="maintenance-item-details">
                            Threshold: ${item.threshold} treatment<br>
                            Treatment sejak terakhir: ${item.treatments_since_last}
                        </div>
                    `;
                    maintenanceList.appendChild(li);
                });
                document.querySelectorAll('.mark-done-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const mid = btn.dataset.machine;
                        const item = btn.dataset.item;
                        try {
                            const res = await fetch('/maintenance-done', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ machine_id: mid, maintenance_item: item })
                            });
                            const result = await res.json();
                            if (result.success) {
                                alert('Maintenance ditandai selesai');
                                modal.style.display = 'none';
                                loadData();
                            } else {
                                alert('Gagal: ' + result.error);
                            }
                        } catch (err) {
                            alert('Error jaringan');
                        }
                    });
                });
                modal.style.display = 'block';
            }

            closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
            window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

            // ---------- RENDER HOME (Ringkasan dengan donut SVG) ----------
            function renderHome() {
                viewTitle.textContent = 'Ringkasan';
                backButton.classList.add('hidden');
                const stats = computeGlobalStats(machinesData);
                const groups = groupByRS(machinesData);
                const rsList = Object.keys(groups).sort();

                // Hitung persentase (hindari pembagian nol)
                const pctHd = stats.total ? (stats.hdOn / stats.total * 100) : 0;
                const pctTreat = stats.total ? (stats.treatment / stats.total * 100) : 0;
                const pctMaint = stats.total ? (stats.maintenance / stats.total * 100) : 0;

                let html = `
                    <div class="insights">
                        ${generateInsightCard('Total Mesin', stats.total, 100)}
                        ${generateInsightCard('HD ON', stats.hdOn, pctHd)}
                        ${generateInsightCard('In Treatment', stats.treatment, pctTreat)}
                        ${generateInsightCard('Need Maintenance', stats.maintenance, pctMaint)}
                    </div>
                    <div class="section-title">Daftar Rumah Sakit / Klinik</div>
                    <div class="rs-grid">
                `;
                if (rsList.length === 0) html += `<div class="empty-message">Belum ada data mesin.</div>`;
                else {
                    rsList.forEach(rs => {
                        const g = groups[rs];
                        html += `
                            <div class="rs-card" data-rs="${rs}">
                                <div class="rs-name">${rs}</div>
                                <div class="rs-unit-count"><i class="fas fa-microchip"></i> ${g.total} unit</div>
                                <div class="rs-stats-mini">
                                    <span class="stat-dot"><span class="dot green"></span> ${g.hdOn}</span>
                                    <span class="stat-dot"><span class="dot blue"></span> ${g.treatment}</span>
                                    <span class="stat-dot"><span class="dot orange"></span> ${g.maintenance}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
                dynamicContent.innerHTML = html;
                document.querySelectorAll('.rs-card').forEach(c => {
                    c.addEventListener('click', () => {
                        selectedRS = c.dataset.rs;
                        currentView = 'detail';
                        renderDetail(selectedRS);
                    });
                });
            }

            // ---------- RENDER DETAIL (Ringkasan per RS dengan donut SVG) ----------
            function renderDetail(rsName) {
                viewTitle.textContent = rsName;
                backButton.classList.remove('hidden');
                const groups = groupByRS(machinesData);
                const g = groups[rsName] || { machines:[], total:0, hdOn:0, treatment:0, maintenance:0 };
                const stats = { total: g.total, hdOn: g.hdOn, treatment: g.treatment, maintenance: g.maintenance };
                const pctHd = stats.total ? (stats.hdOn / stats.total * 100) : 0;
                const pctTreat = stats.total ? (stats.treatment / stats.total * 100) : 0;
                const pctMaint = stats.total ? (stats.maintenance / stats.total * 100) : 0;
                
                let html = `
                    <div class="insights">
                        ${generateInsightCard('Total Mesin', stats.total, 100)}
                        ${generateInsightCard('HD ON', stats.hdOn, pctHd)}
                        ${generateInsightCard('In Treatment', stats.treatment, pctTreat)}
                        ${generateInsightCard('Need Maintenance', stats.maintenance, pctMaint)}
                    </div>
                    <div class="section-title">Rincian Mesin</div>
                    <div class="machines-grid" id="machinesGridContainer">
                `;
                if (g.machines.length === 0) html += `<div class="empty-message">Tidak ada mesin</div>`;
                else {
                    g.machines.sort((a,b) => a.machineId.localeCompare(b.machineId));
                    g.machines.forEach(({ machineId, data, parsed }) => {
                        const mainStatus = getMainStatus(data);
                        let statusClass = 'stopped', statusText = 'IDLE';
                        if (mainStatus === 'running') { statusClass = 'running'; statusText = 'HD ON'; }
                        else if (mainStatus === 'treatment') { statusClass = 'treatment'; statusText = 'TREATMENT'; }
                        else if (mainStatus === 'maintenance') { statusClass = 'maintenance'; statusText = 'MAINTENANCE'; }
                        
                        const maintenanceBadge = data.maintenance_count > 0 ? `<span class="maintenance-badge" data-machine="${machineId}">⚠️ ${data.maintenance_count}</span>` : '';
                        const unitText = parsed.unit ? ` • Unit ${parsed.unit}` : '';
                        
                        html += `
                            <div class="machine-card" data-machine-id="${machineId}">
                                <div class="machine-header">
                                    <div class="machine-id-section">
                                        <div class="machine-main-id">${unitText}</div>
                                        <div class="machine-sub">${parsed.rsBase || 'Tanpa RS'}</div>
                                        <div class="machine-sn">SN: ${parsed.sn || ''}</div>
                                    </div>
                                    <div class="header-badges">
                                        ${maintenanceBadge}
                                        <div class="status-badge ${statusClass}">${statusText}</div>
                                    </div>
                                </div>
                                <div class="machine-stats">
                                    <div class="stat-row"><span class="stat-label">Waktu Aktif</span><span class="stat-value time-value" data-field="active">${formatTime(data.current_session_duration||0)}</span></div>
                                    <div class="stat-row"><span class="stat-label">Total Aktif</span><span class="stat-value">${formatTime(data.total_active_time||0)}</span></div>
                                    <div class="stat-row"><span class="stat-label">Sesi Aktif Selesai</span><span class="stat-value">${data.completed_treatments||0}</span></div>
                                    <div class="stat-row" style="margin-top:8px;"><span class="stat-label">Waktu Treatment</span><span class="stat-value dialysis-time-value" data-field="dialysis">${formatTime(data.current_dialysis_duration||0)}</span></div>
                                    <div class="stat-row"><span class="stat-label">Total Treatment</span><span class="stat-value">${formatTime(data.total_dialysis_time||0)}</span></div>
                                    <div class="stat-row"><span class="stat-label">Treatment Selesai</span><span class="stat-value">${data.completed_dialysis||0}</span></div>
                                </div>
                                <div class="last-update">Update: ${formatDateTime(data.last_update)}</div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
                dynamicContent.innerHTML = html;

                // Pasang event listener untuk maintenance badge
                document.querySelectorAll('.maintenance-badge').forEach(badge => {
                    badge.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const mid = badge.dataset.machine;
                        const machine = machinesData[mid];
                        if (machine && machine.maintenance_required) {
                            showMaintenanceModal(mid, machine.maintenance_required);
                        }
                    });
                });
            }

            // ---------- TIMER REAL-TIME (update durasi) ----------
            function updateTimers() {
                const grid = document.getElementById('machinesGridContainer');
                if (!grid) return;
                grid.querySelectorAll('.machine-card').forEach(card => {
                    const mid = card.dataset.machineId;
                    const machine = machinesData[mid];
                    if (!machine) return;
                    
                    if (machine.status === 'running') {
                        const activeEl = card.querySelector('[data-field="active"]');
                        if (activeEl) {
                            let sec = (machine.current_session_duration || 0) + 1;
                            machine.current_session_duration = sec;
                            activeEl.textContent = formatTime(sec);
                        }
                    }
                    if (machine.pump_status === 'running') {
                        const dialysisEl = card.querySelector('[data-field="dialysis"]');
                        if (dialysisEl) {
                            let sec = (machine.current_dialysis_duration || 0) + 1;
                            machine.current_dialysis_duration = sec;
                            dialysisEl.textContent = formatTime(sec);
                        }
                    }
                });
            }

            // ---------- DATA FETCH ----------
            async function loadData() {
                try {
                    const res = await fetch('/api/machines');
                    if (!res.ok) throw new Error('Gagal fetch');
                    machinesData = await res.json();
                    if (currentView === 'home') renderHome();
                    else if (currentView === 'detail' && selectedRS) renderDetail(selectedRS);
                    else { currentView = 'home'; renderHome(); }
                } catch (e) {
                    dynamicContent.innerHTML = `<div class="empty-message">Error memuat data.</div>`;
                }
            }

            function goHome() {
                currentView = 'home';
                selectedRS = null;
                renderHome();
                navHome.classList.add('active');
            }

            navHome.addEventListener('click', goHome);
            backButton.addEventListener('click', ()=> {
                if (currentView === 'detail') goHome();
            });
            refreshBtn.addEventListener('click', loadData);

            // Inisialisasi
            loadData();
            setInterval(updateTimers, 1000);
            setInterval(loadData, 30000);
        })();
    </script>
</body>
</html>
