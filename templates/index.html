<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD Machine Monitoring Dashboard</title>
    <!-- Font Awesome untuk ikon (opsional tapi direkomendasikan) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background-color: #f5f9ff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid #e0eaf5;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            box-shadow: 2px 0 12px rgba(0, 40, 80, 0.02);
            overflow-y: auto;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, #4a90e2, #2b6cb0);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(74, 144, 226, 0.2);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
            text-align: center;
            line-height: 1.4;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: #7a8aa0;
            margin-top: 6px;
            text-align: center;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #4a5c6c;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background-color: transparent;
        }

        .nav-item i {
            width: 20px;
            font-size: 1.2rem;
            color: #6b85a0;
        }

        .nav-item.active {
            background-color: #eef4ff;
            color: #2b6cb0;
        }

        .nav-item.active i {
            color: #2b6cb0;
        }

        .nav-item:hover:not(.active) {
            background-color: #f8fafd;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            background-color: #f5f9ff;
        }

        /* Header area dalam main content */
        .content-header {
            display: flex;
            align-items: center;
            margin-bottom: 28px;
        }

        .content-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1e3a6f;
            flex: 1;
        }

        .back-button {
            background: none;
            border: 1px solid #d0ddee;
            background-color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: #2b4f7b;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .back-button:hover {
            background-color: #eef4ff;
            border-color: #4a90e2;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: white;
            border-radius: 18px;
            padding: 20px 18px;
            box-shadow: 0 8px 18px rgba(0, 20, 40, 0.04);
            display: flex;
            flex-direction: column;
            border: 1px solid #eef2f9;
            transition: transform 0.15s;
        }

        .summary-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(74, 144, 226, 0.08);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .card-header i {
            font-size: 28px;
            color: #4a90e2;
            opacity: 0.7;
        }

        .card-label {
            font-size: 14px;
            font-weight: 500;
            color: #5f738c;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .card-value {
            font-size: 38px;
            font-weight: 700;
            color: #1e3a6f;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background-color: #e3eaf3;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90e2, #2b6cb0);
            border-radius: 10px;
            width: 0%;
        }

        .progress-percent {
            font-size: 13px;
            font-weight: 600;
            color: #3a6ea5;
            min-width: 40px;
            text-align: right;
        }

        /* RS Grid (Home) */
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e3a6f;
            margin-bottom: 18px;
        }

        .rs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .rs-card {
            background: white;
            border-radius: 16px;
            padding: 22px 20px;
            box-shadow: 0 8px 16px rgba(0, 20, 40, 0.03);
            border: 1px solid #e8f0fe;
            cursor: pointer;
            transition: all 0.2s;
        }

        .rs-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(74, 144, 226, 0.1);
            border-color: #c2d9fc;
        }

        .rs-name {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .rs-unit-count {
            font-size: 14px;
            color: #5f7d9c;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        .rs-stats-mini {
            display: flex;
            gap: 12px;
            font-size: 13px;
        }

        .stat-dot {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot.green { background: #2ecc71; }
        .dot.blue { background: #3498db; }
        .dot.orange { background: #e67e22; }

        /* Machine Cards (Detail View) */
        .machines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .machine-card {
            background: white;
            border-radius: 16px;
            padding: 18px 18px 14px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2ecfe;
            transition: all 0.15s;
        }

        .machine-card:hover {
            box-shadow: 0 12px 22px rgba(74, 144, 226, 0.08);
        }

        .machine-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .machine-id-section {
            line-height: 1.3;
        }

        .machine-main-id {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a6f;
        }

        .machine-sub {
            font-size: 12px;
            color: #6b85a0;
            margin-top: 4px;
        }

        .machine-sn {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 12px;
            color: #4a6a8a;
            background: #f0f6ff;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 5px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.hd-on { background: #2ecc71; color: white; }
        .status-badge.idle { background: #b0c4de; color: #1e3a6f; }
        .status-badge.treatment { background: #3498db; color: white; }
        .status-badge.maintenance { background: #e67e22; color: white; }

        .machine-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0 8px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-label {
            font-size: 13px;
            color: #5f7d9c;
        }

        .stat-value {
            font-weight: 600;
            color: #1e3a6f;
            font-size: 15px;
        }

        .progress-small {
            width: 100%;
            height: 5px;
            background: #e3eaf3;
            border-radius: 5px;
            margin-top: 4px;
        }

        .progress-fill {
            height: 5px;
            background: #4a90e2;
            border-radius: 5px;
            width: 0%;
        }

        .last-update {
            font-size: 10px;
            color: #9aabbc;
            text-align: right;
            margin-top: 8px;
        }

        /* Empty state */
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #7a9cc6;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 700px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e0eaf5; padding: 16px; }
            .main-content { padding: 16px; }
            .summary-grid { grid-template-columns: 1fr; }
            .rs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-heartbeat"></i>
            </div>
            <div class="sidebar-title">HD Machine Monitoring</div>
            <div class="sidebar-subtitle">Real-time Monitoring System</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" id="navHome">
                <i class="fas fa-chart-pie"></i>
                <span>Ringkasan</span>
            </div>
            <!-- Menu tambahan bisa ditambahkan di sini -->
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <!-- Akan diisi oleh JavaScript -->
        <div class="content-header">
            <h1 id="viewTitle">Ringkasan</h1>
            <button class="back-button" id="backButton" style="display: none;">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
        </div>
        <div id="dynamicContent">
            <!-- Tempat render view -->
            <div class="empty-message">Memuat data...</div>
        </div>
    </div>

    <script>
        (function(){
            // ---------- STATE ----------
            let currentView = 'home';          // 'home' atau 'detail'
            let selectedRS = null;             // nama RS yang dipilih
            let machinesData = {};             // data mentah dari API
            
            // Elemen DOM
            const viewTitle = document.getElementById('viewTitle');
            const backButton = document.getElementById('backButton');
            const dynamicContent = document.getElementById('dynamicContent');
            const navHome = document.getElementById('navHome');

            // ---------- HELPER FUNCTIONS ----------
            function parseMachineId(fullId) {
                const parts = fullId.split('-');
                return {
                    id: parts[0] || fullId,
                    rs: parts[1] || '',
                    sn: parts[2] || ''
                };
            }

            // Format detik ke HH:MM:SS
            function formatTime(seconds) {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            function formatDateTime(isoString) {
                if (!isoString) return 'Belum update';
                const d = new Date(isoString);
                return d.toLocaleString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            }

            // Tentukan status utama mesin (prioritas: maintenance > treatment > hd_on > idle)
            function getMainStatus(machine) {
                if (machine.maintenance_count > 0) return 'maintenance';
                if (machine.pump_status === 'running') return 'treatment';
                if (machine.status === 'running') return 'hd-on';
                return 'idle';
            }

            // ---------- GROUPING & STATISTIK ----------
            function computeGlobalStats(machines) {
                const stats = {
                    total: 0,
                    hdOn: 0,
                    treatment: 0,
                    maintenance: 0
                };
                Object.values(machines).forEach(m => {
                    stats.total++;
                    if (m.status === 'running') stats.hdOn++;
                    if (m.pump_status === 'running') stats.treatment++;
                    if (m.maintenance_count > 0) stats.maintenance++;
                });
                return stats;
            }

            function groupByRS(machines) {
                const groups = {};
                Object.entries(machines).forEach(([machineId, data]) => {
                    const parsed = parseMachineId(machineId);
                    const rsName = parsed.rs || 'Tanpa RS';
                    if (!groups[rsName]) {
                        groups[rsName] = {
                            machines: [],
                            total: 0,
                            hdOn: 0,
                            treatment: 0,
                            maintenance: 0
                        };
                    }
                    groups[rsName].machines.push({ machineId, data, parsed });
                    groups[rsName].total++;
                    if (data.status === 'running') groups[rsName].hdOn++;
                    if (data.pump_status === 'running') groups[rsName].treatment++;
                    if (data.maintenance_count > 0) groups[rsName].maintenance++;
                });
                return groups;
            }

            // ---------- RENDER VIEWS ----------
            function renderHome() {
                viewTitle.textContent = 'Ringkasan';
                backButton.style.display = 'none';
                
                const machines = machinesData;
                const stats = computeGlobalStats(machines);
                const groups = groupByRS(machines);
                const rsList = Object.keys(groups).sort();

                // Hitung persentase untuk progress
                const percentHd = stats.total ? (stats.hdOn / stats.total * 100) : 0;
                const percentTreatment = stats.total ? (stats.treatment / stats.total * 100) : 0;
                const percentMaintenance = stats.total ? (stats.maintenance / stats.total * 100) : 0;

                let html = `
                    <!-- Summary Cards Global -->
                    <div class="summary-grid">
                        <div class="summary-card">
                            <div class="card-header">
                                <span class="card-label">Total Mesin</span>
                                <i class="fas fa-server"></i>
                            </div>
                            <div class="card-value">${stats.total}</div>
                            <div class="progress-wrapper">
                                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%"></div></div>
                                <span class="progress-percent">100%</span>
                            </div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header">
                                <span class="card-label">HD ON</span>
                                <i class="fas fa-play-circle"></i>
                            </div>
                            <div class="card-value">${stats.hdOn}</div>
                            <div class="progress-wrapper">
                                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentHd}%"></div></div>
                                <span class="progress-percent">${percentHd.toFixed(0)}%</span>
                            </div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header">
                                <span class="card-label">IN TREATMENT</span>
                                <i class="fas fa-syringe"></i>
                            </div>
                            <div class="card-value">${stats.treatment}</div>
                            <div class="progress-wrapper">
                                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentTreatment}%"></div></div>
                                <span class="progress-percent">${percentTreatment.toFixed(0)}%</span>
                            </div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header">
                                <span class="card-label">NEED MAINTENANCE</span>
                                <i class="fas fa-tools"></i>
                            </div>
                            <div class="card-value">${stats.maintenance}</div>
                            <div class="progress-wrapper">
                                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentMaintenance}%"></div></div>
                                <span class="progress-percent">${percentMaintenance.toFixed(0)}%</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="section-title">Daftar Rumah Sakit / Klinik</div>
                    <div class="rs-grid">
                `;

                if (rsList.length === 0) {
                    html += `<div class="empty-message">Belum ada data mesin.</div>`;
                } else {
                    rsList.forEach(rsName => {
                        const g = groups[rsName];
                        html += `
                            <div class="rs-card" data-rs="${rsName}">
                                <div class="rs-name">${rsName}</div>
                                <div class="rs-unit-count"><i class="fas fa-microchip"></i> ${g.total} unit</div>
                                <div class="rs-stats-mini">
                                    <span class="stat-dot"><span class="dot green"></span> ${g.hdOn}</span>
                                    <span class="stat-dot"><span class="dot blue"></span> ${g.treatment}</span>
                                    <span class="stat-dot"><span class="dot orange"></span> ${g.maintenance}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
                dynamicContent.innerHTML = html;

                // Tambahkan event listener ke RS card
                document.querySelectorAll('.rs-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const rs = card.dataset.rs;
                        if (rs) {
                            selectedRS = rs;
                            currentView = 'detail';
                            renderDetail(rs);
                        }
                    });
                });
            }

            function renderDetail(rsName) {
                viewTitle.textContent = rsName;
                backButton.style.display = 'flex';
                
                const groups = groupByRS(machinesData);
                const rsGroup = groups[rsName] || { machines: [], total:0, hdOn:0, treatment:0, maintenance:0 };
                const machines = rsGroup.machines;
                const stats = {
                    total: rsGroup.total,
                    hdOn: rsGroup.hdOn,
                    treatment: rsGroup.treatment,
                    maintenance: rsGroup.maintenance
                };

                const percentHd = stats.total ? (stats.hdOn / stats.total * 100) : 0;
                const percentTreatment = stats.total ? (stats.treatment / stats.total * 100) : 0;
                const percentMaintenance = stats.total ? (stats.maintenance / stats.total * 100) : 0;

                let html = `
                    <!-- Summary Cards RS -->
                    <div class="summary-grid">
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">Total Mesin</span><i class="fas fa-server"></i></div>
                            <div class="card-value">${stats.total}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%"></div></div><span class="progress-percent">100%</span></div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">HD ON</span><i class="fas fa-play-circle"></i></div>
                            <div class="card-value">${stats.hdOn}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentHd}%"></div></div><span class="progress-percent">${percentHd.toFixed(0)}%</span></div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">IN TREATMENT</span><i class="fas fa-syringe"></i></div>
                            <div class="card-value">${stats.treatment}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentTreatment}%"></div></div><span class="progress-percent">${percentTreatment.toFixed(0)}%</span></div>
                        </div>
                        <div class="summary-card">
                            <div class="card-header"><span class="card-label">NEED MAINTENANCE</span><i class="fas fa-tools"></i></div>
                            <div class="card-value">${stats.maintenance}</div>
                            <div class="progress-wrapper"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percentMaintenance}%"></div></div><span class="progress-percent">${percentMaintenance.toFixed(0)}%</span></div>
                        </div>
                    </div>
                    
                    <div class="section-title">Rincian Mesin</div>
                    <div class="machines-grid">
                `;

                if (machines.length === 0) {
                    html += `<div class="empty-message">Tidak ada mesin di RS ini.</div>`;
                } else {
                    machines.sort((a,b) => a.machineId.localeCompare(b.machineId));
                    machines.forEach(({ machineId, data, parsed }) => {
                        const mainStatus = getMainStatus(data);
                        let statusText = '';
                        let statusClass = '';
                        switch(mainStatus) {
                            case 'hd-on': statusText = 'HD ON'; statusClass = 'hd-on'; break;
                            case 'treatment': statusText = 'IN TREATMENT'; statusClass = 'treatment'; break;
                            case 'maintenance': statusText = 'NEED MAINTENANCE'; statusClass = 'maintenance'; break;
                            default: statusText = 'IDLE'; statusClass = 'idle';
                        }
                        
                        // Durasi
                        const activeDuration = formatTime(data.current_session_duration || 0);
                        const totalActive = formatTime(data.total_active_time || 0);
                        const dialysisDuration = formatTime(data.current_dialysis_duration || 0);
                        const totalDialysis = formatTime(data.total_dialysis_time || 0);
                        
                        // Progress sederhana (treatment progress vs waktu typical?)
                        // Gunakan threshold 5440 detik untuk treatment selesai (dari data)
                        const treatmentProgress = data.status === 'running' ? Math.min((data.current_session_duration / 5440) * 100, 100) : 0;
                        
                        html += `
                            <div class="machine-card">
                                <div class="machine-header">
                                    <div class="machine-id-section">
                                        <div class="machine-main-id">${parsed.id}</div>
                                        <div class="machine-sub">${parsed.rs || 'Tanpa RS'}</div>
                                        <span class="machine-sn">SN: ${parsed.sn || 'N/A'}</span>
                                    </div>
                                    <div class="status-badge ${statusClass}">${statusText}</div>
                                </div>
                                <div class="machine-stats">
                                    <div class="stat-row">
                                        <span class="stat-label">Waktu Aktif</span>
                                        <span class="stat-value">${activeDuration}</span>
                                    </div>
                                    <div class="progress-small"><div class="progress-fill" style="width:${treatmentProgress}%"></div></div>
                                    <div class="stat-row">
                                        <span class="stat-label">Total Aktif</span>
                                        <span class="stat-value">${totalActive}</span>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Treatment</span>
                                        <span class="stat-value">${dialysisDuration}</span>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Total Treatment</span>
                                        <span class="stat-value">${totalDialysis}</span>
                                    </div>
                                    <div class="stat-row">
                                        <span class="stat-label">Sesi Selesai</span>
                                        <span class="stat-value">${data.completed_treatments || 0} / ${data.completed_dialysis || 0}</span>
                                    </div>
                                </div>
                                <div class="last-update">Update: ${formatDateTime(data.last_update)}</div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
                dynamicContent.innerHTML = html;
            }

            // ---------- FETCH DATA & INIT ----------
            async function loadData() {
                try {
                    const response = await fetch('/api/machines');
                    if (!response.ok) throw new Error('Gagal memuat data');
                    machinesData = await response.json();
                    
                    // Render sesuai currentView
                    if (currentView === 'home') {
                        renderHome();
                    } else if (currentView === 'detail' && selectedRS) {
                        renderDetail(selectedRS);
                    } else {
                        // fallback
                        currentView = 'home';
                        renderHome();
                    }
                } catch (err) {
                    console.error(err);
                    dynamicContent.innerHTML = `<div class="empty-message">Gagal memuat data. Periksa koneksi.</div>`;
                }
            }

            // Navigasi
            function goHome() {
                currentView = 'home';
                selectedRS = null;
                renderHome();
                navHome.classList.add('active');
            }

            function goBack() {
                if (currentView === 'detail') {
                    currentView = 'home';
                    selectedRS = null;
                    renderHome();
                    navHome.classList.add('active');
                }
            }

            // Event Listeners
            navHome.addEventListener('click', goHome);
            backButton.addEventListener('click', goBack);

            // Refresh manual (bisa ditambahkan tombol jika mau)
            // Saat ini, cukup load awal dan tidak auto refresh (opsional setInterval)
            // Inisialisasi
            loadData();

            // Optional: polling setiap 30 detik untuk update data
            setInterval(() => {
                loadData();
            }, 30000); // 30 detik

            // Timer lokal untuk increment waktu (opsional, hanya visual)
            setInterval(() => {
                // Cukup render ulang view saat ini agar timer berjalan
                if (currentView === 'home') renderHome();
                else if (currentView === 'detail' && selectedRS) renderDetail(selectedRS);
            }, 1000);
        })();
    </script>
</body>
</html>
