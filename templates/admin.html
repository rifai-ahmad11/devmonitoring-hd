<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Metadata - HD Monitoring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
            color: #1e1e2f;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }
        .admin-header h1 {
            font-size: 32px;
            font-weight: 600;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
        }
        .admin-header i {
            margin-right: 10px;
        }
        .header-actions {
            display: flex;
            gap: 15px;
        }
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            text-decoration: none;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        .btn-danger {
            background: rgba(220, 53, 69, 0.8);
        }
        .btn-danger:hover {
            background: rgba(220, 53, 69, 1);
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            color: #333;
        }
        .section-title {
            font-size: 22px;
            font-weight: 600;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-grid input {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.2s;
        }
        .form-grid input:focus {
            outline: none;
            border-color: #4a90e2;
        }
        .btn-primary {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-delete {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #1e3a6f;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background: #fafafa;
        }
        .loading-message {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        hr {
            margin: 30px 0;
            border: 0;
            border-top: 2px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1><i class="fas fa-database"></i> Manajemen Metadata Mesin</h1>
            <div class="header-actions">
                <a href="/" class="btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/logout" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Form Card -->
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #1e3a6f;">
                <i class="fas fa-pen"></i> Tambah / Edit Metadata
            </h2>
            <div class="form-grid">
                <input type="text" id="adminMachineId" placeholder="Machine ID *" required>
                <input type="text" id="adminModel" placeholder="Model (opsional)">
                <input type="text" id="adminHospitalName" placeholder="Nama RS/Klinik *" required>
                <input type="number" id="adminUnitNumber" placeholder="Nomor Unit (opsional)">
                <input type="text" id="adminRegion" placeholder="Region (contoh: Jawa Barat)">
                <input type="text" id="adminSubregion" placeholder="Subregion (contoh: Bandung)">
                <input type="text" id="adminAddress" placeholder="Alamat lengkap" style="grid-column: span 2;">
            </div>
            <div style="display: flex; gap: 15px;">
                <button id="adminSaveBtn" class="btn-primary"><i class="fas fa-save"></i> Simpan Metadata</button>
                <button id="clearFormBtn" class="btn-secondary"><i class="fas fa-eraser"></i> Bersihkan Form</button>
            </div>
        </div>

        <hr>

        <!-- Daftar Metadata -->
        <div class="section-title">
            <i class="fas fa-list"></i> Daftar Metadata Mesin
        </div>
        <div class="card" style="padding: 0; overflow-x: auto;">
            <table id="metadataTable">
                <thead>
                    <tr>
                        <th>Machine ID</th>
                        <th>Nama RS</th>
                        <th>Unit</th>
                        <th>Region</th>
                        <th>Subregion</th>
                        <th style="width: 180px;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="metadataTableBody">
                    <tr><td colspan="6" class="loading-message">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        (function() {
            // Helper escape HTML
            function escapeHtml(str) {
                if (!str) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // Load metadata list
            async function loadMetadataList() {
                const tbody = document.getElementById('metadataTableBody');
                tbody.innerHTML = '<tr><td colspan="6" class="loading-message">Memuat data...</td></tr>';
                
                try {
                    const res = await fetch('/api/metadata');
                    if (!res.ok) throw new Error('Gagal fetch');
                    const data = await res.json();
                    
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-message">Belum ada data metadata.</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = '';
                    data.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><code>${escapeHtml(item.machine_id)}</code></td>
                            <td>${escapeHtml(item.hospital_name)}</td>
                            <td>${item.unit_number || '-'}</td>
                            <td>${escapeHtml(item.region || '-')}</td>
                            <td>${escapeHtml(item.subregion || '-')}</td>
                            <td>
                                <button class="btn-secondary edit-btn" data-id="${escapeHtml(item.machine_id)}">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn-delete delete-btn" data-id="${escapeHtml(item.machine_id)}">
                                    <i class="fas fa-trash"></i> Hapus
                                </button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                    
                    attachTableEvents();
                } catch (err) {
                    console.error(err);
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-message">Gagal memuat data. Periksa koneksi.</td></tr>';
                }
            }

            function attachTableEvents() {
                // Edit button
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        try {
                            const res = await fetch(`/api/metadata/${id}`);
                            if (!res.ok) throw new Error('Gagal ambil detail');
                            const data = await res.json();
                            
                            document.getElementById('adminMachineId').value = data.machine_id;
                            document.getElementById('adminModel').value = data.model || '';
                            document.getElementById('adminHospitalName').value = data.hospital_name || '';
                            document.getElementById('adminUnitNumber').value = data.unit_number || '';
                            document.getElementById('adminRegion').value = data.region || '';
                            document.getElementById('adminSubregion').value = data.subregion || '';
                            document.getElementById('adminAddress').value = data.address || '';
                            
                            // Scroll ke form
                            document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
                        } catch (err) {
                            alert('Gagal mengambil data mesin.');
                        }
                    });
                });

                // Delete button
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm('Yakin ingin menghapus metadata ini? Data mesin tetap ada.')) return;
                        const id = btn.dataset.id;
                        try {
                            const res = await fetch(`/api/metadata/${id}`, { method: 'DELETE' });
                            if (res.ok) {
                                alert('Metadata berhasil dihapus.');
                                loadMetadataList();
                            } else {
                                const err = await res.json();
                                alert('Gagal: ' + (err.error || 'Unknown error'));
                            }
                        } catch (err) {
                            alert('Gagal menghapus metadata.');
                        }
                    });
                });
            }

            // Save metadata (POST/PUT)
            document.getElementById('adminSaveBtn').addEventListener('click', async () => {
                const machineId = document.getElementById('adminMachineId').value.trim();
                const hospitalName = document.getElementById('adminHospitalName').value.trim();
                
                if (!machineId) {
                    alert('Machine ID harus diisi!');
                    return;
                }
                if (!hospitalName) {
                    alert('Nama Rumah Sakit harus diisi!');
                    return;
                }

                const payload = {
                    machine_id: machineId,
                    model: document.getElementById('adminModel').value.trim() || null,
                    hospital_name: hospitalName,
                    unit_number: document.getElementById('adminUnitNumber').value ? parseInt(document.getElementById('adminUnitNumber').value) : null,
                    region: document.getElementById('adminRegion').value.trim() || null,
                    subregion: document.getElementById('adminSubregion').value.trim() || null,
                    address: document.getElementById('adminAddress').value.trim() || null
                };

                try {
                    // Cek apakah sudah ada
                    const checkRes = await fetch(`/api/metadata/${machineId}`);
                    const method = checkRes.ok ? 'PUT' : 'POST';
                    const url = method === 'PUT' ? `/api/metadata/${machineId}` : '/api/metadata';

                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        alert('Metadata berhasil disimpan!');
                        loadMetadataList();
                        clearForm();
                    } else {
                        const err = await res.json();
                        alert('Gagal menyimpan: ' + (err.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('Gagal terhubung ke server.');
                }
            });

            function clearForm() {
                document.querySelectorAll('#adminMachineId, #adminModel, #adminHospitalName, #adminUnitNumber, #adminRegion, #adminSubregion, #adminAddress').forEach(i => i.value = '');
            }

            document.getElementById('clearFormBtn').addEventListener('click', clearForm);

            // Logout manual (opsional, karena link sudah mengarah ke /admin/logout)
            // Bisa tambahkan konfirmasi

            // Load data saat halaman dimuat
            loadMetadataList();
        })();
    </script>
</body>
</html>
