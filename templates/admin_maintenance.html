<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Config - HD Monitoring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
            color: #1e1e2f;
        }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; color: white;
        }
        .admin-header h1 {
            font-size: 32px; font-weight: 600;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
        }
        .header-actions { display: flex; gap: 15px; }
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 10px 20px; border-radius: 30px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.2s; backdrop-filter: blur(4px); text-decoration: none;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.4); }
        .btn-danger { background: rgba(220, 53, 69, 0.8); }
        .btn-danger:hover { background: rgba(220, 53, 69, 1); }
        .card {
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); color: #333; margin-bottom: 30px;
        }
        .section-title {
            font-size: 22px; font-weight: 600; color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2); margin-bottom: 20px;
        }
        .form-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;
        }
        .form-grid input, .form-grid select, .form-grid textarea {
            padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 14px; transition: border 0.2s;
        }
        .form-grid textarea { resize: vertical; }
        .form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus {
            outline: none; border-color: #4a90e2;
        }
        .full-width { grid-column: span 2; }
        .btn-primary {
            background: #4caf50; color: white; border: none;
            padding: 12px 25px; border-radius: 30px; font-size: 16px;
            font-weight: 600; cursor: pointer;
        }
        .btn-primary:hover { background: #45a049; }
        .btn-secondary {
            background: #f0f0f0; color: #333; border: none;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-right: 5px;
        }
        .btn-delete {
            background: #f44336; color: white; border: none;
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-weight: 600; color: #1e3a6f; border-bottom: 2px solid #e0e0e0; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover { background: #fafafa; }
        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .badge-count { background: #3498db; color: white; }
        .badge-time { background: #9b59b6; color: white; }
        .loading-message, .empty-message { text-align: center; padding: 40px; color: #999; }
        .error-message { color: #dc3545; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1><i class="fas fa-tools"></i> Maintenance Configuration</h1>
            <div class="header-actions">
                <a href="/" class="btn"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin" class="btn"><i class="fas fa-database"></i> Metadata</a>
                <a href="/admin/users" class="btn"><i class="fas fa-users-cog"></i> Users</a>
                <a href="/logout" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Form Tambah/Edit -->
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #1e3a6f;">
                <i class="fas fa-pen"></i> <span id="formTitle">Tambah Konfigurasi Maintenance</span>
            </h2>
            <div class="form-grid">
                <input type="text" id="itemCode" placeholder="Item Code (contoh: filter_inlet) *" required>
                <input type="text" id="itemName" placeholder="Nama Item *" required>
                <textarea id="itemDesc" class="full-width" rows="3" placeholder="Deskripsi (opsional)"></textarea>
                <select id="thresholdType" required>
                    <option value="">Tipe Threshold *</option>
                    <option value="treatment_count">Berdasarkan Jumlah Treatment</option>
                    <option value="time_interval">Berdasarkan Interval Waktu</option>
                </select>
                <div>
                    <input type="number" id="thresholdValue" placeholder="Nilai Threshold *" required min="1" style="width:100%;">
                </div>
                <div id="timeUnitGroup" style="display: none;">
                    <select id="timeUnit">
                        <option value="">Pilih Satuan Waktu</option>
                        <option value="days">Hari</option>
                        <option value="months">Bulan</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button id="saveBtn" class="btn-primary"><i class="fas fa-save"></i> Simpan</button>
                <button id="cancelBtn" class="btn-secondary" style="display: none;"><i class="fas fa-times"></i> Batal</button>
            </div>
            <div id="formError" class="error-message"></div>
        </div>

        <!-- Daftar Konfigurasi -->
        <div class="section-title"><i class="fas fa-list"></i> Daftar Konfigurasi Maintenance</div>
        <div class="card" style="padding: 0; overflow-x: auto;">
            <table id="configTable">
                <thead>
                    <tr>
                        <th>Item Code</th><th>Nama</th><th>Deskripsi</th>
                        <th>Tipe</th><th>Threshold</th><th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="configTableBody">
                    <tr><td colspan="6" class="loading-message">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        (function() {
            let editingId = null;

            // Escape HTML
            function escapeHtml(str) {
                if (!str) return '';
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            // Tampilkan/sembunyikan time_unit berdasarkan threshold_type
            document.getElementById('thresholdType').addEventListener('change', function() {
                const timeGroup = document.getElementById('timeUnitGroup');
                timeGroup.style.display = this.value === 'time_interval' ? 'block' : 'none';
            });

            // Load configs
            async function loadConfigs() {
                const tbody = document.getElementById('configTableBody');
                tbody.innerHTML = '<tr><td colspan="6" class="loading-message">Memuat data...</td></tr>';
                try {
                    const res = await fetch('/api/maintenance-config');
                    if (!res.ok) throw new Error('Gagal memuat');
                    const configs = await res.json();
                    if (configs.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-message">Belum ada konfigurasi.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = '';
                    configs.forEach(c => {
                        const row = document.createElement('tr');
                        let thresholdDisplay = '';
                        if (c.threshold_type === 'treatment_count') {
                            thresholdDisplay = `${c.threshold_value} treatment`;
                        } else {
                            thresholdDisplay = `${c.threshold_value} ${c.time_unit || 'hari'}`;
                        }
                        const typeBadge = c.threshold_type === 'treatment_count'
                            ? '<span class="badge badge-count">Treatment Count</span>'
                            : '<span class="badge badge-time">Time Interval</span>';
                        row.innerHTML = `
                            <td><code>${escapeHtml(c.item_code)}</code></td>
                            <td>${escapeHtml(c.name)}</td>
                            <td>${escapeHtml(c.description || '-')}</td>
                            <td>${typeBadge}</td>
                            <td>${thresholdDisplay}</td>
                            <td>
                                <button class="btn-secondary edit-btn" data-id="${c.id}"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn-delete delete-btn" data-id="${c.id}"><i class="fas fa-trash"></i> Hapus</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                    attachEvents();
                } catch (err) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-message">Gagal memuat data.</td></tr>';
                }
            }

            function attachEvents() {
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        try {
                            const res = await fetch(`/api/maintenance-config`);
                            const configs = await res.json();
                            const config = configs.find(c => c.id == id);
                            if (config) {
                                document.getElementById('itemCode').value = config.item_code;
                                document.getElementById('itemName').value = config.name;
                                document.getElementById('itemDesc').value = config.description || '';
                                document.getElementById('thresholdType').value = config.threshold_type;
                                document.getElementById('thresholdValue').value = config.threshold_value;
                                document.getElementById('timeUnit').value = config.time_unit || '';
                                document.getElementById('timeUnitGroup').style.display = config.threshold_type === 'time_interval' ? 'block' : 'none';
                                editingId = config.id;
                                document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit"></i> Edit Konfigurasi';
                                document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> Update';
                                document.getElementById('cancelBtn').style.display = 'inline-block';
                                window.scrollTo({ top: 0, behavior: 'smooth' });
                            }
                        } catch (err) {
                            alert('Gagal mengambil detail');
                        }
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm('Yakin ingin menghapus?')) return;
                        const id = btn.dataset.id;
                        try {
                            const res = await fetch(`/api/maintenance-config/${id}`, { method: 'DELETE' });
                            if (res.ok) {
                                alert('Konfigurasi dihapus');
                                loadConfigs();
                            } else {
                                const err = await res.json();
                                alert('Gagal: ' + err.error);
                            }
                        } catch (err) {
                            alert('Gagal koneksi');
                        }
                    });
                });
            }

            function resetForm() {
                document.getElementById('itemCode').value = '';
                document.getElementById('itemName').value = '';
                document.getElementById('itemDesc').value = '';
                document.getElementById('thresholdType').value = '';
                document.getElementById('thresholdValue').value = '';
                document.getElementById('timeUnit').value = '';
                document.getElementById('timeUnitGroup').style.display = 'none';
                editingId = null;
                document.getElementById('formTitle').innerHTML = '<i class="fas fa-pen"></i> Tambah Konfigurasi Maintenance';
                document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> Simpan';
                document.getElementById('cancelBtn').style.display = 'none';
                document.getElementById('formError').textContent = '';
            }

            document.getElementById('cancelBtn').addEventListener('click', resetForm);

            document.getElementById('saveBtn').addEventListener('click', async () => {
                const itemCode = document.getElementById('itemCode').value.trim();
                const name = document.getElementById('itemName').value.trim();
                const desc = document.getElementById('itemDesc').value.trim();
                const type = document.getElementById('thresholdType').value;
                const value = document.getElementById('thresholdValue').value;
                const timeUnit = document.getElementById('timeUnit').value;

                if (!itemCode || !name || !type || !value) {
                    document.getElementById('formError').textContent = 'Semua field wajib diisi.';
                    return;
                }
                if (type === 'time_interval' && !timeUnit) {
                    document.getElementById('formError').textContent = 'Satuan waktu harus dipilih.';
                    return;
                }

                const payload = {
                    item_code: itemCode,
                    name: name,
                    description: desc,
                    threshold_type: type,
                    threshold_value: parseInt(value),
                    time_unit: type === 'time_interval' ? timeUnit : null
                };

                const url = editingId ? `/api/maintenance-config/${editingId}` : '/api/maintenance-config';
                const method = editingId ? 'PUT' : 'POST';

                try {
                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        alert(editingId ? 'Konfigurasi diperbarui' : 'Konfigurasi ditambahkan');
                        resetForm();
                        loadConfigs();
                    } else {
                        const err = await res.json();
                        document.getElementById('formError').textContent = err.error || 'Gagal menyimpan';
                    }
                } catch (err) {
                    document.getElementById('formError').textContent = 'Gagal terhubung ke server';
                }
            });

            // Init
            loadConfigs();
        })();
    </script>
</body>
</html>
